<svg viewBox="0 0 32 32" width="32" height="32" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>jobhunt-os</title>

  <!-- Dark rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="#16161A"/>

  <!-- Sweep sector (teal) -->
