  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#5DCAA5" stroke-width="1.25" opacity="0.85"/>

  <!-- Inner ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#5DCAA5" stroke-width="0.75" opacity="0.5"/>

  <!-- Sweep line -->
