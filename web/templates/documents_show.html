<!doctype html>
<html lang="en" data-theme="{{ or .Theme.Value "system" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Document.Name }} - JobHunt OS</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-heading">
        <h1><a class="brand-link" href="/" aria-label="JobHunt OS dashboard">JobHunt OS</a></h1>
      </div>
      <div class="topbar-actions">
        <nav aria-label="Primary">
        <a href="/">Dashboard</a>
        <a href="/applications">Applications</a>
        <a href="/documents" aria-current="page">Documents</a>
        <a href="/contacts">Contacts</a>
        <a href="/settings">Settings</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="panel document-viewer-panel">
        <div class="panel-header document-viewer-header">
          <div>
            <p class="eyebrow">{{ .TypeLabel }}</p>
            <h2>{{ .Document.Name }}</h2>
            <p class="document-viewer-meta">Updated {{ .Updated }}</p>
          </div>
          <div class="button-row">
            <a class="button secondary" href="/documents">Back to documents</a>
            <a class="button secondary" href="{{ .PreviewURL }}">Open PDF directly</a>
            <a class="button" href="{{ .DownloadURL }}">Download PDF</a>
          </div>
        </div>

        <!-- Browser PDF viewers need script-capable iframe contexts for reliable inline preview. -->
        <iframe class="document-preview" src="{{ .PreviewURL }}" title="PDF preview for {{ .Document.Name }}" sandbox="allow-same-origin allow-scripts" referrerpolicy="same-origin"></iframe>
      </section>
    </main>
  </body>
</html>
