<!doctype html>
<html lang="en" data-theme="{{ or .Theme.Value "system" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Document.Name }} - JobHunt OS</title>
    <link rel="icon" href="/static/jobhunt-os-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-heading">
        <div class="topbar-brand"><a class="brand-link brand-logo-link" href="/" aria-label="JobHunt OS dashboard"><img class="brand-logo" src="/static/jobhunt-os-logo-horizontal.svg" alt="JobHunt OS"></a></div>
      </div>
      <div class="topbar-actions">
        <nav class="desktop-primary-nav" aria-label="Primary">
          <a href="/">Dashboard</a>
          <a href="/applications">Applications</a>
          <a href="/documents" aria-current="page">Documents</a>
          <a href="/contacts">Contacts</a>
          <a href="/settings">Settings</a>
        </nav>
        <details class="mobile-primary-nav-menu">
          <summary aria-label="Primary navigation">
            <span class="menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
          </summary>
          <nav aria-label="Primary mobile">
            <a href="/">Dashboard</a>
            <a href="/applications">Applications</a>
            <a href="/documents" aria-current="page">Documents</a>
            <a href="/contacts">Contacts</a>
            <a href="/settings">Settings</a>
          </nav>
        </details>
      </div>
    </header>

    <main>
      <section class="panel document-viewer-panel">
        <div class="panel-header document-viewer-header">
          <div>
            <p class="eyebrow">{{ .TypeLabel }}</p>
            <h1>{{ .Document.Name }}</h1>
            <p class="document-viewer-meta">Updated {{ .Updated }}</p>
          </div>
          <div class="button-row">
            <a class="button secondary" href="/documents">Back to documents</a>
            <a class="button secondary" href="{{ .PreviewURL }}">Open PDF directly</a>
            <a class="button" href="{{ .DownloadURL }}">Download PDF</a>
          </div>
        </div>

        <!-- Browser PDF viewers need script-capable iframe contexts for reliable inline preview. -->
        <iframe class="document-preview" src="{{ .PreviewURL }}" title="PDF preview for {{ .Document.Name }}" sandbox="allow-same-origin allow-scripts" referrerpolicy="same-origin"></iframe>
      </section>
    </main>
  </body>
</html>
