<!doctype html>
<html lang="en" data-theme="{{ or .Theme.Value "system" }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Application - JobHunt OS</title>
    <link rel="icon" href="/static/jobhunt-os-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-heading">
        <div class="topbar-brand"><a class="brand-link brand-logo-link" href="/" aria-label="JobHunt OS dashboard"><img class="brand-logo" src="/static/jobhunt-os-logo-horizontal.svg" alt="JobHunt OS"></a></div>
      </div>
      <div class="topbar-actions">
        <nav class="desktop-primary-nav" aria-label="Primary">
          <a href="/">Dashboard</a>
          <a href="/applications" aria-current="page">Applications</a>
          <a href="/documents">Documents</a>
          <a href="/contacts">Contacts</a>
          <a href="/settings">Settings</a>
        </nav>
        <details class="mobile-primary-nav-menu">
          <summary aria-label="Primary navigation">
            <span class="menu-icon" aria-hidden="true"><span></span><span></span><span></span></span>
          </summary>
          <nav aria-label="Primary mobile">
            <a href="/">Dashboard</a>
            <a href="/applications" aria-current="page">Applications</a>
            <a href="/documents">Documents</a>
            <a href="/contacts">Contacts</a>
            <a href="/settings">Settings</a>
          </nav>
        </details>
      </div>
    </header>

    <main>
      <form class="form-panel" method="post" action="/applications" enctype="multipart/form-data" novalidate>
        {{ .CSRFToken }}

        <div class="panel-header">
          <div>
            <p class="eyebrow">Opportunity details</p>
            <h1>Track a role</h1>
          </div>
          <button type="submit">Create application</button>
        </div>

        {{ with .Errors.Get "form" }}
        <div class="form-alert" role="alert">{{ . }}</div>
        {{ end }}

        <div class="form-grid">
          <label>
            <span>Company</span>
            <input name="company" value="{{ .Values.Company }}" autocomplete="off" required{{ with .Errors.Get "company" }} aria-invalid="true" aria-describedby="company-error"{{ end }}>
            {{ with .Errors.Get "company" }}<strong id="company-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Role</span>
            <input name="role" value="{{ .Values.Role }}" autocomplete="off" required{{ with .Errors.Get "role" }} aria-invalid="true" aria-describedby="role-error"{{ end }}>
            {{ with .Errors.Get "role" }}<strong id="role-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Status</span>
            <select name="status" autocomplete="off" required{{ with .Errors.Get "status" }} aria-invalid="true" aria-describedby="status-error"{{ end }}>
              {{ range .StatusOptions }}
              <option value="{{ .Value }}" {{ if eq $.Values.Status .Value }}selected{{ end }}>{{ .Label }}</option>
              {{ end }}
            </select>
            {{ with .Errors.Get "status" }}<strong id="status-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Priority</span>
            <select name="priority" autocomplete="off" required{{ with .Errors.Get "priority" }} aria-invalid="true" aria-describedby="priority-error"{{ end }}>
              {{ range .PriorityOptions }}
              <option value="{{ .Value }}" {{ if eq $.Values.Priority .Value }}selected{{ end }}>{{ .Label }}</option>
              {{ end }}
            </select>
            {{ with .Errors.Get "priority" }}<strong id="priority-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Source</span>
            <input name="source" value="{{ .Values.Source }}" autocomplete="off">
          </label>

          <label>
            <span>Original link</span>
            <input name="posting_url" type="url" value="{{ .Values.PostingURL }}" autocomplete="off"{{ with .Errors.Get "posting_url" }} aria-invalid="true" aria-describedby="posting-url-error"{{ end }}>
            {{ with .Errors.Get "posting_url" }}<strong id="posting-url-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Posting PDF</span>
            <input name="posting_pdf" type="file" accept="application/pdf,.pdf" autocomplete="off"{{ with .Errors.Get "posting_pdf" }} aria-invalid="true" aria-describedby="posting-pdf-error"{{ end }}>
            {{ with .Errors.Get "posting_pdf" }}<strong id="posting-pdf-error">{{ . }}</strong>{{ end }}
          </label>

          <label>
            <span>Location</span>
            <input name="location" value="{{ .Values.Location }}" autocomplete="off">
          </label>

          <label>
            <span>Next action summary</span>
            <input name="next_action_summary" value="{{ .Values.NextActionSummary }}" autocomplete="off">
          </label>

          <label>
            <span>Next action due</span>
            <input name="next_action_due" type="date" value="{{ .Values.NextActionDue }}" autocomplete="off"{{ with .Errors.Get "next_action_due" }} aria-invalid="true" aria-describedby="next-action-due-error"{{ end }}>
            {{ with .Errors.Get "next_action_due" }}<strong id="next-action-due-error">{{ . }}</strong>{{ end }}
          </label>

          <label class="full-span">
            <span>Notes</span>
            <textarea name="notes" rows="6" autocomplete="off">{{ .Values.Notes }}</textarea>
          </label>
        </div>
      </form>
    </main>
  </body>
</html>
