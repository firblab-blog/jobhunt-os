stages:
  - validate
  - scan
  - publish
  - deploy
  - mirror
  - release

include:
  - project: "infrastructure/ci-templates"
    ref: main
    file: sonarqube-ci.yml

default:
  image: golang:1.26
  tags:
    - docker

variables:
  JOBHUNT_OS_IMAGE_COMMIT: "${CI_REGISTRY_IMAGE}/jobhunt-os:${CI_COMMIT_SHORT_SHA}"
  JOBHUNT_OS_IMAGE_LATEST: "${CI_REGISTRY_IMAGE}/jobhunt-os:latest"
  GHCR_IMAGE: "ghcr.io/firblab-blog/jobhunt-os"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

.jobhunt-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

go:test:
  stage: validate
  # TODO: Pin this official Go image to a digest after validating it from Docker Hub.
  extends: .jobhunt-rules
  script:
    - go mod verify
    - go vet ./...
    - mkdir -p coverage
    - go test -race -coverprofile=coverage/coverage.out ./...
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - coverage/coverage.out

sonarqube:analyze:
  stage: scan
  extends: .sonarqube-analysis
  needs:
    - job: go:test
  before_script: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $SONAR_HOST_URL && $SONAR_TOKEN
      variables:
        SONAR_SCANNER_OPTS: >-
          -Dsonar.pullrequest.provider=gitlab
          -Dsonar.pullrequest.gitlab.repositorySlug=${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}
          -Dsonar.pullrequest.key=${CI_MERGE_REQUEST_IID}
          -Dsonar.pullrequest.branch=${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
          -Dsonar.pullrequest.base=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $SONAR_HOST_URL && $SONAR_TOKEN

docker:publish:
  stage: publish
  image: docker:28.0.1
  services:
    - name: docker:28.0.1-dind
      command: ["--tls=false"]
  needs:
    - job: go:test
    - job: sonarqube:analyze
      optional: true
  before_script: []
  script:
    - echo "${CI_REGISTRY_PASSWORD}" | docker login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
    - docker build --pull -t "${JOBHUNT_OS_IMAGE_COMMIT}" -t "${JOBHUNT_OS_IMAGE_LATEST}" .
    - docker push "${JOBHUNT_OS_IMAGE_COMMIT}"
    - docker push "${JOBHUNT_OS_IMAGE_LATEST}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

ghcr:publish:
  stage: publish
  image: docker:28.0.1
  services:
    - name: docker:28.0.1-dind
      command: ["--tls=false"]
  needs:
    - job: go:test
    - job: sonarqube:analyze
      optional: true
    - job: docker:publish
      optional: true
  before_script: []
  script:
    - |
      set -e

      if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
        echo "Skipping GHCR publish because GHCR_USERNAME/GHCR_TOKEN are not available to this pipeline."
        exit 0
      fi

      GHCR_IMAGE_SHA="${GHCR_IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"

      echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin

      if [ -n "${CI_COMMIT_TAG}" ]; then
        GHCR_IMAGE_VERSION="${GHCR_IMAGE}:${CI_COMMIT_TAG}"
        docker build --pull -t "${GHCR_IMAGE_VERSION}" -t "${GHCR_IMAGE}:latest" -t "${GHCR_IMAGE_SHA}" .
        docker push "${GHCR_IMAGE_VERSION}"
        docker push "${GHCR_IMAGE}:latest"
        docker push "${GHCR_IMAGE_SHA}"
      else
        echo "${CI_REGISTRY_PASSWORD}" | docker login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
        docker pull "${JOBHUNT_OS_IMAGE_COMMIT}"
        docker tag "${JOBHUNT_OS_IMAGE_COMMIT}" "${GHCR_IMAGE_SHA}"
        docker push "${GHCR_IMAGE_SHA}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

deploy:prepare-vars:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker:publish
  before_script: []
  script:
    - printf 'UPSTREAM_JOBHUNT_OS_IMAGE=%s\n' "${JOBHUNT_OS_IMAGE_COMMIT}" > deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $JOBHUNT_OS_AUTO_DEPLOY == "true"

deploy:firblab-v2:
  stage: deploy
  needs:
    - job: deploy:prepare-vars
      artifacts: true
  trigger:
    project: "${FIRBLAB_V2_PROJECT_PATH}"
    branch: "${FIRBLAB_V2_DEPLOY_REF}"
    strategy: depend
  variables:
    DEPLOY_TARGET: "jobhunt-os"
    JOBHUNT_OS_IMAGE: "${UPSTREAM_JOBHUNT_OS_IMAGE}"
    JOBHUNT_OS_REGISTRY_SERVER: "${JOBHUNT_OS_REGISTRY_SERVER}"
    JOBHUNT_OS_REGISTRY_INSECURE: "${JOBHUNT_OS_REGISTRY_INSECURE}"
    JOBHUNT_OS_REGISTRY_HOSTNAME: "${JOBHUNT_OS_REGISTRY_HOSTNAME}"
    JOBHUNT_OS_REGISTRY_HOST_ADDRESS: "${JOBHUNT_OS_REGISTRY_HOST_ADDRESS}"
    JOBHUNT_OS_GITLAB_HOSTNAME: "${JOBHUNT_OS_GITLAB_HOSTNAME}"
    JOBHUNT_OS_GITLAB_HOST_ADDRESS: "${JOBHUNT_OS_GITLAB_HOST_ADDRESS}"
    JOBHUNT_OS_DEPLOY_REGISTRY_USERNAME: "${JOBHUNT_OS_DEPLOY_REGISTRY_USERNAME}"
    JOBHUNT_OS_DEPLOY_REGISTRY_PASSWORD: "${JOBHUNT_OS_DEPLOY_REGISTRY_PASSWORD}"
    JOBHUNT_OS_REGISTRY_USERNAME: "${CI_REGISTRY_USER}"
    JOBHUNT_OS_REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $JOBHUNT_OS_AUTO_DEPLOY == "true"

mirror:github:
  stage: mirror
  image: alpine:3.20
  needs:
    - job: go:test
    - job: sonarqube:analyze
      optional: true
  before_script: []
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - |
      set -e
      apk add --no-cache git

      git config user.email "ci@firblab.org"
      git config user.name "firblab-ci"

      MIRROR_URL=$(echo "${GITHUB_MIRROR_REPO}" | sed "s|https://|https://x-access-token:${GITHUB_MIRROR_TOKEN}@|")
      if [ -n "${CI_COMMIT_TAG}" ]; then
        git push "${MIRROR_URL}.git" "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
        echo "Mirror tag push to GitHub complete."
      else
        git push --force "${MIRROR_URL}.git" HEAD:refs/heads/main
        echo "Mirror branch push to GitHub complete."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO

release:github:
  stage: release
  image: alpine:3.20
  needs:
    - job: mirror:github
    - job: ghcr:publish
      optional: true
  before_script: []
  script:
    - |
      set -e
      apk add --no-cache curl jq

      REPO_PATH=$(echo "${GITHUB_MIRROR_REPO}" | sed -E 's#^https://github.com/##; s#^git@github.com:##; s#\.git$##')
      GHCR_IMAGE_VERSION="${GHCR_IMAGE}:${CI_COMMIT_TAG}"
      GHCR_IMAGE_SHA="${GHCR_IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"
      RELEASE_BODY=$(printf 'Container images:\n\n- `%s`\n- `%s`\n- `%s`\n\nInstall with Docker Compose by using the default `latest` tag, or pin `%s` for explicit upgrades.\n' "${GHCR_IMAGE_VERSION}" "${GHCR_IMAGE}:latest" "${GHCR_IMAGE_SHA}" "${GHCR_IMAGE_VERSION}")

      jq -n \
        --arg tag_name "${CI_COMMIT_TAG}" \
        --arg name "JobHunt OS ${CI_COMMIT_TAG}" \
        --arg body "${RELEASE_BODY}" \
        '{tag_name: $tag_name, name: $name, body: $body, draft: false, prerelease: false}' \
        > release.json

      status=$(curl -sS -o release-response.json -w "%{http_code}" \
        -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer ${GITHUB_MIRROR_TOKEN}" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        "https://api.github.com/repos/${REPO_PATH}/releases" \
        --data @release.json)

      if [ "${status}" = "201" ]; then
        echo "GitHub release ${CI_COMMIT_TAG} created."
        exit 0
      fi

      if [ "${status}" = "422" ]; then
        echo "GitHub release ${CI_COMMIT_TAG} already exists or cannot be created for this tag."
        cat release-response.json
        exit 0
      fi

      cat release-response.json
      exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO && $GHCR_USERNAME && $GHCR_TOKEN
