stages:
  - validate
  - scan
  - publish
  - image-scan
  - deploy
  - mirror
  - release

include:
  - project: "infrastructure/ci-templates"
    ref: main
    file: sonarqube-ci.yml

default:
  image: golang:1.26.3@sha256:2981696eed011d747340d7252620932677929cce7d2d539602f56a8d7e9b660b
  tags:
    - docker

variables:
  JOBHUNT_OS_IMAGE_COMMIT: "${CI_REGISTRY_IMAGE}/jobhunt-os:${CI_COMMIT_SHORT_SHA}"
  JOBHUNT_OS_IMAGE_LATEST: "${CI_REGISTRY_IMAGE}/jobhunt-os:latest"
  GHCR_IMAGE: "ghcr.io/firblab-blog/jobhunt-os"
  GOVULNCHECK_VERSION: "v1.3.0"

.jobhunt-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

.docker-dind-tls:
  image: docker:28.0.1@sha256:71835c5efd0a0f907330f2b04b0ea8a143d0201072494e67eb7699d69281c9e2
  services:
    - name: docker:28.0.1-dind@sha256:71835c5efd0a0f907330f2b04b0ea8a143d0201072494e67eb7699d69281c9e2
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"

go:test:
  stage: validate
  extends: .jobhunt-rules
  script:
    - go mod verify
    - go vet ./...
    - mkdir -p coverage
    - go test -race -coverprofile=coverage/coverage.out ./...
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - coverage/coverage.out

go:govulncheck:
  stage: validate
  extends: .jobhunt-rules
  script:
    - go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

sonarqube:analyze:
  stage: scan
  extends: .sonarqube-analysis
  needs:
    - job: go:test
  before_script: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $SONAR_HOST_URL && $SONAR_TOKEN
      variables:
        SONAR_SCANNER_OPTS: >-
          -Dsonar.pullrequest.provider=gitlab
          -Dsonar.pullrequest.gitlab.repositorySlug=${CI_PROJECT_NAMESPACE}/${CI_PROJECT_NAME}
          -Dsonar.pullrequest.key=${CI_MERGE_REQUEST_IID}
          -Dsonar.pullrequest.branch=${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
          -Dsonar.pullrequest.base=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $SONAR_HOST_URL && $SONAR_TOKEN

docker:publish:
  stage: publish
  extends: .docker-dind-tls
  needs:
    - job: go:test
    - job: go:govulncheck
    - job: sonarqube:analyze
      optional: true
  before_script: []
  script:
    - set +x
    - printf '%s' "${CI_REGISTRY_PASSWORD}" | docker login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
    - docker build --pull -t "${JOBHUNT_OS_IMAGE_COMMIT}" -t "${JOBHUNT_OS_IMAGE_LATEST}" .
    - docker push "${JOBHUNT_OS_IMAGE_COMMIT}"
    - docker push "${JOBHUNT_OS_IMAGE_LATEST}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

ghcr:publish:
  stage: publish
  extends: .docker-dind-tls
  needs:
    - job: go:test
    - job: go:govulncheck
    - job: sonarqube:analyze
      optional: true
    - job: docker:publish
      optional: true
  before_script: []
  script:
    - |
      set +x
      set -e

      if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
        echo "Skipping GHCR publish because GHCR_USERNAME/GHCR_TOKEN are not available to this pipeline."
        exit 0
      fi

      GHCR_IMAGE_SHA="${GHCR_IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"

      printf '%s' "${GHCR_TOKEN}" | docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin

      if [ -n "${CI_COMMIT_TAG}" ]; then
        GHCR_IMAGE_VERSION="${GHCR_IMAGE}:${CI_COMMIT_TAG}"
        docker build --pull -t "${GHCR_IMAGE_VERSION}" -t "${GHCR_IMAGE}:latest" -t "${GHCR_IMAGE_SHA}" .
        docker push "${GHCR_IMAGE_VERSION}"
        docker push "${GHCR_IMAGE}:latest"
        docker push "${GHCR_IMAGE_SHA}"
      else
        printf '%s' "${CI_REGISTRY_PASSWORD}" | docker login "${CI_REGISTRY}" --username "${CI_REGISTRY_USER}" --password-stdin
        docker pull "${JOBHUNT_OS_IMAGE_COMMIT}"
        docker tag "${JOBHUNT_OS_IMAGE_COMMIT}" "${GHCR_IMAGE_SHA}"
        docker push "${GHCR_IMAGE_SHA}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

container:sbom-and-scan:
  stage: image-scan
  image:
    name: aquasec/trivy:0.70.0@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e
    entrypoint: [""]
  needs:
    - job: docker:publish
      optional: true
    - job: ghcr:publish
      optional: true
  variables:
    TRIVY_CACHE_DIR: ".trivycache"
    TRIVY_NO_PROGRESS: "true"
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  before_script: []
  script:
    - |
      set +x
      set -e

      if [ -n "${CI_COMMIT_TAG}" ]; then
        IMAGE_TO_SCAN="${GHCR_IMAGE}:${CI_COMMIT_TAG}"
        export TRIVY_USERNAME="${GHCR_USERNAME}"
        export TRIVY_PASSWORD="${GHCR_TOKEN}"
      else
        IMAGE_TO_SCAN="${JOBHUNT_OS_IMAGE_COMMIT}"
        export TRIVY_USERNAME="${CI_REGISTRY_USER}"
        export TRIVY_PASSWORD="${CI_REGISTRY_PASSWORD}"
      fi

      trivy image \
        --format cyclonedx \
        --output gl-sbom.cdx.json \
        "${IMAGE_TO_SCAN}"

      trivy image \
        --format template \
        --template "@/contrib/gitlab.tpl" \
        --output gl-container-scanning-report.json \
        "${IMAGE_TO_SCAN}"

      trivy image \
        --exit-code 1 \
        --ignore-unfixed \
        --severity CRITICAL \
        "${IMAGE_TO_SCAN}"
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      container_scanning: gl-container-scanning-report.json
      cyclonedx:
        - gl-sbom.cdx.json
    paths:
      - gl-container-scanning-report.json
      - gl-sbom.cdx.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $GHCR_USERNAME && $GHCR_TOKEN

deploy:prepare-vars:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: docker:publish
    - job: container:sbom-and-scan
      optional: true
  before_script: []
  script:
    - printf 'UPSTREAM_JOBHUNT_OS_IMAGE=%s\n' "${JOBHUNT_OS_IMAGE_COMMIT}" > deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $JOBHUNT_OS_AUTO_DEPLOY == "true"

deploy:internal-runtime:
  stage: deploy
  needs:
    - job: deploy:prepare-vars
      artifacts: true
  inherit:
    variables: false
  trigger:
    project: "${FIRBLAB_V2_PROJECT_PATH}"
    branch: "${FIRBLAB_V2_DEPLOY_REF}"
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: false
  variables:
    DEPLOY_TARGET: "jobhunt-os"
    JOBHUNT_OS_IMAGE: "${UPSTREAM_JOBHUNT_OS_IMAGE}"
    JOBHUNT_OS_REGISTRY_SERVER: "${JOBHUNT_OS_REGISTRY_SERVER}"
    JOBHUNT_OS_REGISTRY_INSECURE: "${JOBHUNT_OS_REGISTRY_INSECURE}"
    JOBHUNT_OS_REGISTRY_HOSTNAME: "${JOBHUNT_OS_REGISTRY_HOSTNAME}"
    JOBHUNT_OS_REGISTRY_HOST_ADDRESS: "${JOBHUNT_OS_REGISTRY_HOST_ADDRESS}"
    JOBHUNT_OS_GITLAB_HOSTNAME: "${JOBHUNT_OS_GITLAB_HOSTNAME}"
    JOBHUNT_OS_GITLAB_HOST_ADDRESS: "${JOBHUNT_OS_GITLAB_HOST_ADDRESS}"
    JOBHUNT_OS_DEPLOY_REGISTRY_USERNAME: "${JOBHUNT_OS_DEPLOY_REGISTRY_USERNAME}"
    JOBHUNT_OS_DEPLOY_REGISTRY_PASSWORD: "${JOBHUNT_OS_DEPLOY_REGISTRY_PASSWORD}"
    JOBHUNT_OS_REGISTRY_USERNAME: "${CI_REGISTRY_USER}"
    JOBHUNT_OS_REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $JOBHUNT_OS_AUTO_DEPLOY == "true"

mirror:github:
  stage: mirror
  image: alpine:3.20
  needs:
    - job: go:test
    - job: go:govulncheck
    - job: sonarqube:analyze
      optional: true
  before_script: []
  variables:
    GIT_DEPTH: 0
    GIT_STRATEGY: clone
  script:
    - |
      set +x
      set -e
      apk add --no-cache git

      git config user.email "ci@firblab.org"
      git config user.name "firblab-ci"

      GITHUB_REPO_PATH=$(printf '%s' "${GITHUB_MIRROR_REPO}" | sed -E 's#^https://github.com/##; s#^git@github.com:##; s#\.git$##')
      if ! printf '%s' "${GITHUB_REPO_PATH}" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
        echo "GITHUB_MIRROR_REPO must be a GitHub owner/repo path or github.com URL."
        exit 1
      fi

      MIRROR_URL="https://github.com/${GITHUB_REPO_PATH}.git"
      cleanup_github_credentials() {
        printf 'protocol=https\nhost=github.com\nusername=x-access-token\npassword=%s\n\n' "${GITHUB_MIRROR_TOKEN}" | git credential reject
        rm -f ~/.git-credentials
      }
      trap cleanup_github_credentials EXIT

      umask 077
      git config --global credential.helper store
      printf 'protocol=https\nhost=github.com\nusername=x-access-token\npassword=%s\n\n' "${GITHUB_MIRROR_TOKEN}" | git credential approve

      if [ -n "${CI_COMMIT_TAG}" ]; then
        git push "${MIRROR_URL}" "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
        echo "Mirror tag push to GitHub complete."
      else
        git push --force "${MIRROR_URL}" HEAD:refs/heads/main
        echo "Mirror branch push to GitHub complete."
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO

release:github:
  stage: release
  image: alpine:3.20
  needs:
    - job: mirror:github
    - job: ghcr:publish
      optional: true
    - job: container:sbom-and-scan
      optional: true
  before_script: []
  script:
    - |
      set +x
      set -e
      apk add --no-cache curl jq

      REPO_PATH=$(printf '%s' "${GITHUB_MIRROR_REPO}" | sed -E 's#^https://github.com/##; s#^git@github.com:##; s#\.git$##')
      if ! printf '%s' "${REPO_PATH}" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
        echo "GITHUB_MIRROR_REPO must be a GitHub owner/repo path or github.com URL."
        exit 1
      fi

      GHCR_IMAGE_VERSION="${GHCR_IMAGE}:${CI_COMMIT_TAG}"
      GHCR_IMAGE_SHA="${GHCR_IMAGE}:sha-${CI_COMMIT_SHORT_SHA}"
      RELEASE_BODY=$(printf 'Container images:\n\n- `%s`\n- `%s`\n- `%s`\n\nInstall with Docker Compose by using the default `latest` tag, or pin `%s` for explicit upgrades.\n' "${GHCR_IMAGE_VERSION}" "${GHCR_IMAGE}:latest" "${GHCR_IMAGE_SHA}" "${GHCR_IMAGE_VERSION}")

      jq -n \
        --arg tag_name "${CI_COMMIT_TAG}" \
        --arg name "JobHunt OS ${CI_COMMIT_TAG}" \
        --arg body "${RELEASE_BODY}" \
        '{tag_name: $tag_name, name: $name, body: $body, draft: false, prerelease: false}' \
        > release.json

      status=$(curl -sS -o release-response.json -w "%{http_code}" \
        -X POST \
        -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer ${GITHUB_MIRROR_TOKEN}" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        "https://api.github.com/repos/${REPO_PATH}/releases" \
        --data @release.json)

      if [ "${status}" = "201" ]; then
        echo "GitHub release ${CI_COMMIT_TAG} created."
        exit 0
      fi

      if [ "${status}" = "422" ]; then
        echo "GitHub release ${CI_COMMIT_TAG} already exists or cannot be created for this tag."
        cat release-response.json
        exit 0
      fi

      cat release-response.json
      exit 1
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/ && $GITHUB_MIRROR_TOKEN && $GITHUB_MIRROR_REPO && $GHCR_USERNAME && $GHCR_TOKEN
