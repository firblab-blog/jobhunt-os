services:
  jobhunt-os-init:
    image: busybox:1.37.0
    restart: "no"
    command:
      - sh
      - -c
      - |
        mkdir -p /data/documents /data/tmp
        chown -R "${JOBHUNT_UID:-65532}:${JOBHUNT_GID:-65532}" /data
    volumes:
      - ./data:/data

  jobhunt-os:
    image: ghcr.io/firblab-blog/jobhunt-os:latest
    user: "${JOBHUNT_UID:-65532}:${JOBHUNT_GID:-65532}"
    restart: unless-stopped
    depends_on:
      jobhunt-os-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JOBHUNT_ADDR: 0.0.0.0:8080
      JOBHUNT_ALLOW_NETWORK: "true"
      JOBHUNT_DATA_DIR: /data
    volumes:
      - ./data:/data
